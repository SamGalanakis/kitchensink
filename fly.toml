app = "kitchensink-sam-20260408-web"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "production"
  BIND_ADDR = "0.0.0.0:8080"
  FRONTEND_DIR = "/app/web/dist"
  PUBLIC_BASE_URL = "https://kitchensink-sam-20260408-web.fly.dev"
  APP_NAME = "Kitchensink"
  SESSION_COOKIE_NAME = "kitchensink_session"
  OPENAI_BASE_URL = "https://openrouter.ai/api/v1"
  OPENAI_MODEL = "openai/gpt-5.4"
  AWS_REGION = "auto"

[http_service]
  internal_port = 8080
  force_https = true
  auto_start_machines = true
  auto_stop_machines = "stop"
  min_machines_running = 1

[vm]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
